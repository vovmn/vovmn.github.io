name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - immunations
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Immunitas.sln

      - name: Build
        run: dotnet build Immunitas.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Immunitas.sln --configuration Release --no-build --verbosity normal

      - name: Build Docker image
        run: docker build -f Immunitas.Portal.Bff/Dockerfile .

  publish-image:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Immunitas.Portal.Bff/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}
