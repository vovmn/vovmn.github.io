name: CI

on:
  workflow_dispatch:

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Immunitas.sln

      - name: Build
        run: dotnet build Immunitas.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Immunitas.sln --configuration Release --no-build --verbosity normal

      - name: Build Docker image
        run: docker build -f Immunitas.Portal.Bff/Dockerfile .
