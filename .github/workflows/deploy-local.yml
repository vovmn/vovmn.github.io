name: Deploy local VM

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: immunitas-local-vm
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy with Docker Compose
    runs-on:
      - self-hosted
      - Linux
      - X64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        run: bash scripts/deploy-local.sh
