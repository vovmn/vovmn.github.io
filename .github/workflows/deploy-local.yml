name: Deploy immunolab

on:
  workflow_dispatch:
  push:
    branches:
      - immunations

permissions:
  contents: read

concurrency:
  group: immunolab
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy with Docker Compose
    runs-on:
      - self-hosted
      - Linux
      - X64
      - immunolab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: bash scripts/deploy-local.sh
