version: '3.9'

services:
  db:
    image: postgres:16
    container_name: auth_postgres
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: superpassword
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  server:
    build: .
    container_name: server_js
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db  
    environment:
      DATABASE_URL: postgres://auth_user:superpassword@db:5432/auth_db
    env_file:
      - .env

networks:
  default:
    name: myapp-networkq


volumes:
  pgdata:
